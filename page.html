<!DOCTYPE html>
<html>
<head>
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2><b>Tip Calculator</b></h2>

        <label>Bill Amount</label>
        <input type="number" id="bill" min="0" oninput="calculate()">
        <p id="billError" style="color: red; font-size: 14px; margin: 4px 0;"></p>
        
        <label>Tip Percentage</label>
        <input type="number" id="tip" min="0" oninput="calculate()">

        <label>Number of People</label>
        <input type="number" id="people" min="1" oninput="calculate()">

        <h3>Total Tip: $<span id="totalTip">0.00</span></h3>
        <h3>Grand Total: $<span id="grandTotal">0.00</span></h3>
        <h3>Per Person: $<span id="perPerson">0.00</span></h3>
    </div>

    <script src="file.js"></script>
</body>
</html>
